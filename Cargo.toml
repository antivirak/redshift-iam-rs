[package]
name = "redshift-iam"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = {
    version = "1.0.102",
    features = ["backtrace"],
}
aws-config = { version = "1.8.15", features = ["behavior-version-latest"] }
aws-credential-types = { version = "1.2.14", features = ["hardcoded-credentials"] }
aws-sdk-redshift = { version = "1.101.1", features = ["behavior-version-latest"] }
aws-sdk-sts = "1.101.0"
base64 = "0.22.1"
connectorx = {
    version = "0.4.5",
    features = ["dst_arrow", "src_postgres"],
}
log = "0.4.29"
regex = "1.12.3"
reqwest = { version = "0.13", features = [
    "cookies",
    "form",
] }
secrecy = "0.10.3"
scraper = "0.26.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
